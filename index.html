<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 대회 보관소</title>
<style>
:root { color-scheme: light; --ink:#16181d; --sub:#6b7280; --line:#e5e7eb; --accent:#0f766e; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif; background:#f4f5f7; color:var(--ink); }
.wrap { max-width:960px; margin:0 auto; padding:20px 16px 60px; }
.hero { background:var(--ink); color:#fff; border-radius:14px; padding:22px 24px; margin-bottom:18px; }
.hero h1 { font-size:22px; font-weight:800; letter-spacing:-.3px; }
.hero .sub { font-size:12.5px; color:#9ca3af; margin-top:6px; }
.pills { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
.pill { background:rgba(255,255,255,.1); border-radius:20px; padding:5px 12px; font-size:12px; color:#e5e7eb; }
.pill b { color:#5eead4; }
.tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.tab { padding:7px 14px; border-radius:18px; border:1px solid #d1d5db; background:#fff; font-size:13px; cursor:pointer; font-family:inherit; }
.tab.on { background:var(--ink); color:#fff; border-color:var(--ink); }
.tab .n { opacity:.55; font-size:11px; margin-left:3px; }
.row2 { display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
.chip { padding:5px 11px; border-radius:13px; border:1px solid #d1d5db; background:#fff; font-size:12px; cursor:pointer; font-family:inherit; }
.chip.on { border-color:var(--accent); background:#f0fdfa; color:var(--accent); font-weight:600; }
.chip.fav.on { border-color:#f59e0b; background:#fffbeb; color:#b45309; }
.topright { display:flex; align-items:center; gap:6px; white-space:nowrap; }
.star { background:none; border:none; cursor:pointer; font-size:16px; line-height:1; padding:0; filter:grayscale(1); opacity:.3; transition:.15s; }
.star:hover { opacity:.6; }
.star.on { filter:none; opacity:1; }
#q { flex:1; min-width:150px; padding:8px 12px; border:1px solid #d1d5db; border-radius:9px; font-size:13px; font-family:inherit; }
.month { font-size:13px; font-weight:800; color:var(--sub); margin:20px 2px 8px; letter-spacing:.3px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
@media (max-width:640px){ .grid { grid-template-columns:1fr; } }
.card { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
.card .top { display:flex; justify-content:space-between; gap:8px; align-items:flex-start; }
.card h3 { font-size:14.5px; font-weight:700; line-height:1.35; }
.card h3 a { color:var(--ink); text-decoration:none; }
.card h3 a:hover { color:var(--accent); text-decoration:underline; }
.dday { font-size:12px; font-weight:800; color:#dc2626; white-space:nowrap; }
.dday.far { color:#9ca3af; font-weight:600; }
.info { font-size:12.5px; color:#4b5563; margin-top:6px; line-height:1.55; }
.badges { display:flex; gap:5px; flex-wrap:wrap; margin-top:8px; }
.b { font-size:11px; padding:2.5px 9px; border-radius:11px; font-weight:600; }
.b.cat-road{background:#eef2ff;color:#4338ca}.b.cat-trail{background:#ecfdf5;color:#047857}.b.cat-triathlon{background:#fff7ed;color:#c2410c}.b.cat-swim{background:#eff6ff;color:#1d4ed8}.b.cat-cycling{background:#fdf4ff;color:#a21caf}
.b.s-open{background:#dcfce7;color:#15803d}.b.s-soon{background:#dbeafe;color:#1e40af}.b.s-closed{background:#f3f4f6;color:#6b7280}.b.s-tbd{background:#fef3c7;color:#b45309}
.b.b-new{background:#dc2626;color:#fff}
.pill.new{background:rgba(255,255,255,.1)}
.pill.new.on{background:#dc2626}
.pill.new.on b{color:#fff}
.note { font-size:11.5px; color:#9ca3af; margin-top:6px; }
.reg { font-size:11.5px; color:#15803d; margin-top:4px; font-weight:600; }
.empty { text-align:center; color:#9ca3af; padding:50px 0; font-size:13px; }
.cnt { font-size:12px; color:var(--sub); margin-bottom:4px; }
.foot { font-size:11px; color:#9ca3af; margin-top:30px; text-align:center; line-height:1.7; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>🏃 내 대회 보관소</h1>
    <div class="sub">국내 러닝 · 트레일 · 철인3종 · 수영 · 자전거 대회 종합 — 매일 아침 6시 자동 갱신</div>
    <div class="pills" id="pills"></div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="row2" id="stats"></div>
  <div class="row2"><input id="q" type="text" placeholder="대회명 · 지역 검색"></div>
  <div class="cnt" id="cnt"></div>
  <div id="list"></div>
  <div class="foot" id="foot"></div>
</div>

<script>
const CATS = {all:"전체", road:"🏃 로드런", trail:"⛰️ 트레일", triathlon:"🏊 철인3종", swim:"🌊 수영", cycling:"🚴 자전거"};
const STATUS_CLS = {"접수중":"s-open","접수예정":"s-soon","접수마감":"s-closed","확인필요":"s-tbd"};
let DATA = {events:[], lastUpdated:"-"};
let curCat = localStorage.getItem("rh_cat") || "all";
let curSt = localStorage.getItem("rh_st") || "all";
let q = "";
let favOnly = false;
const FAV = new Set(JSON.parse(localStorage.getItem("rh_fav")||"[]"));
function favKey(e){ return (e.name||"")+"|"+(e.date||""); }
function saveFav(){ localStorage.setItem("rh_fav", JSON.stringify([...FAV])); }
const TODAY = new Date(); TODAY.setHours(0,0,0,0);

function dday(ds){
  if(!ds || ds.length < 10) return null;
  const d = new Date(ds+"T00:00:00");
  const diff = Math.round((d - TODAY)/86400000);
  if(diff < 0) return {t:"종료", far:true};
  if(diff === 0) return {t:"D-DAY", far:false};
  return {t:"D-"+diff, far:diff > 30};
}
function dateLabel(ds){
  if(!ds) return "일정 미정";
  const days = ["일","월","화","수","목","금","토"];
  if(ds.length >= 10){ const d = new Date(ds+"T00:00:00"); return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} (${days[d.getDay()]})`; }
  const [y,m] = ds.split("-"); return `${y}년 ${parseInt(m)}월 (일자 미정)`;
}
function monthKey(ds){
  if(!ds) return "일정 미정";
  const [y,m] = ds.split("-"); return `${y}년 ${parseInt(m)}월`;
}
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function render(){
  const pills = document.getElementById("pills");
  const openN = DATA.events.filter(e=>e.status==="접수중").length;
  const soonN = DATA.events.filter(e=>e.status==="접수예정").length;
  const m30 = DATA.events.filter(e=>{const d=dday(e.date);return d&&d.t!=="종료"&&!d.far;}).length;
  const newN = DATA.events.filter(e=>e.justOpened).length;
  pills.innerHTML = `<span class="pill">총 <b>${DATA.events.length}</b>개 대회</span>
    <span class="pill new${newN?" on":""}">🆕 오늘 새로 열림 <b>${newN}</b></span>
    <span class="pill">접수중 <b>${openN}</b></span>
    <span class="pill">접수예정 <b>${soonN}</b></span>
    <span class="pill">30일 내 개최 <b>${m30}</b></span>
    <span class="pill">갱신 <b>${DATA.lastUpdated}</b></span>`;
  const tabs = document.getElementById("tabs"); tabs.innerHTML = "";
  Object.entries(CATS).forEach(([k,v])=>{
    const n = k==="all" ? DATA.events.length : DATA.events.filter(e=>e.cat===k).length;
    const b = document.createElement("button");
    b.className = "tab"+(curCat===k?" on":"");
    b.innerHTML = v+`<span class="n">${n}</span>`;
    b.onclick = ()=>{curCat=k; localStorage.setItem("rh_cat",k); render();};
    tabs.appendChild(b);
  });
  const st = document.getElementById("stats"); st.innerHTML = "";
  ["all","접수중","접수예정","접수마감","확인필요"].forEach(s=>{
    const c = document.createElement("button");
    c.className = "chip"+(curSt===s?" on":"");
    c.textContent = s==="all"?"모든 상태":s;
    c.onclick = ()=>{curSt=s; localStorage.setItem("rh_st",s); render();};
    st.appendChild(c);
  });
  const favN = DATA.events.filter(e=>FAV.has(favKey(e))).length;
  const fc = document.createElement("button");
  fc.className = "chip fav"+(favOnly?" on":"");
  fc.textContent = "⭐ 관심 "+favN;
  fc.onclick = ()=>{favOnly=!favOnly; render();};
  st.appendChild(fc);
  let list = DATA.events.filter(e=>
    (curCat==="all"||e.cat===curCat) &&
    (curSt==="all"||e.status===curSt) &&
    (!favOnly || FAV.has(favKey(e))) &&
    (!q || e.name.toLowerCase().includes(q) || (e.loc||"").toLowerCase().includes(q))
  );
  list.sort((a,b)=>((a.date||"9999")).localeCompare(b.date||"9999"));
  document.getElementById("cnt").textContent = `${list.length}개 대회`;
  const el = document.getElementById("list"); el.innerHTML = "";
  if(!list.length){ el.innerHTML = '<div class="empty">조건에 맞는 대회가 없습니다</div>'; return; }
  let lastM = null, grid = null;
  list.forEach(e=>{
    const mk = monthKey(e.date);
    if(mk !== lastM){
      lastM = mk;
      const h = document.createElement("div"); h.className="month"; h.textContent = mk;
      el.appendChild(h);
      grid = document.createElement("div"); grid.className="grid"; el.appendChild(grid);
    }
    const dd = dday(e.date);
    const card = document.createElement("div"); card.className = "card";
    card.innerHTML = `
      <div class="top">
        <h3>${e.url?`<a href="${esc(e.url)}" target="_blank" rel="noopener">${esc(e.name)}</a>`:esc(e.name)}</h3>
        <span class="topright">${dd?`<span class="dday${dd.far?" far":""}">${dd.t}</span>`:""}<button class="star${FAV.has(favKey(e))?" on":""}" data-k="${esc(favKey(e))}" title="관심 대회 등록/해제">⭐</button></span>
      </div>
      <div class="info">📅 ${dateLabel(e.date)} · 📍 ${esc(e.loc)}${e.courses?`<br>${esc(e.courses)}`:""}</div>
      <div class="badges">
        ${e.justOpened?'<span class="b b-new">🆕 오늘 접수 시작</span>':""}
        <span class="b cat-${e.cat}">${(CATS[e.cat]||e.cat).replace(/^[^\s]+ /,"")}</span>
        <span class="b ${STATUS_CLS[e.status]||"s-tbd"}">${esc(e.status)}</span>
      </div>
      ${e.reg?`<div class="reg">📝 접수: ${esc(e.reg)}</div>`:""}
      ${e.note?`<div class="note">${esc(e.note)}</div>`:""}`;
    grid.appendChild(card);
  });
  const log = DATA.sourceLog ? Object.entries(DATA.sourceLog).map(([k,v])=>`${k}: ${v}`).join(" · ") : "";
  document.getElementById("foot").innerHTML = `데이터 출처: roadrun.co.kr · triathlon.or.kr · 수동 관리 목록${log?`<br>${esc(log)}`:""}<br>대회 정보는 변동될 수 있으니 신청 전 반드시 공식 홈페이지를 확인하세요.`;
}
document.getElementById("q").addEventListener("input",ev=>{q=ev.target.value.trim().toLowerCase();render();});
document.getElementById("list").addEventListener("click",ev=>{
  const b = ev.target.closest(".star"); if(!b) return;
  const k = b.getAttribute("data-k");
  if(FAV.has(k)) FAV.delete(k); else FAV.add(k);
  saveFav(); render();
});
fetch("data.json?t="+Date.now()).then(r=>r.json()).then(d=>{DATA=d;render();})
  .catch(()=>{document.getElementById("list").innerHTML='<div class="empty">data.json을 불러올 수 없습니다</div>';});
</script>
</body>
</html>
