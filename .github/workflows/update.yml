name: 매일 대회 데이터 갱신

on:
  schedule:
    - cron: '0 21 * * *'   # UTC 21:00 = 한국시간 매일 아침 6:00
  workflow_dispatch:        # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 라이브러리 설치
        run: pip install requests beautifulsoup4

      - name: 대회 데이터 수집
        run: python scripts/scrape.py

      - name: 변경사항 커밋
        run: |
          git config user.name "race-hub-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "자동 갱신: $(date -u -d '+9 hours' '+%Y-%m-%d %H:%M') KST"
          git push
